<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

   
    <style>

        
      .main {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .box-1 {
        height: 200px;
        width: 200px;
        background-color: rgb(151, 38, 161);
        text-align: center;
        border: 2px solid black;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        
      }
      .box-2 {
        background-color: rgb(0, 204, 255);
        width: 100px;
        height: 100px;
        box-shadow: 10px 10px red;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="box-1">
        
        <div class="box-2"></div>
      </div>
    </div>
  </body>
</html>
